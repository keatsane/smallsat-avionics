# the full incident-and-recovery arc: undervoltage forces SAFE, the ground clears the
# latched fault explicitly (REQ-FAULT-010, CLEAR_FAULT arg 4 = UNDERVOLTAGE's id), and
# the only legal exit from SAFE is this ground-commanded return to STANDBY (REQ-MODE-006)
id: SIL-006
title: ground recovers the spacecraft from safe mode
verifies: [REQ-FAULT-010, REQ-MODE-006]
timeline:
  - { t: 100, cmd: { name: SET_MODE, arg: 1, seq: 1 } }
  - { t: 200, fault: { name: UNDERVOLTAGE, bad: 1 } }
  - { t: 300, fault: { name: UNDERVOLTAGE, bad: 1 } }
  - { t: 400, fault: { name: UNDERVOLTAGE, bad: 1 } }
  - { t: 600, cmd: { name: CLEAR_FAULT, arg: 4, seq: 2 } }
  - { t: 700, cmd: { name: SET_MODE, arg: 1, seq: 3 } }
  - { t: 900 }
expect:
  mode_log:
    - { to: STANDBY, trigger: Command, req: REQ-CMD-001 }
    - { to: SAFE, trigger: FaultEntry, req: REQ-FAULT-002 }
    - { from: SAFE, to: STANDBY, trigger: Command, req: REQ-CMD-001 }
  acks:
    - { seq: 2, accepted: true }
    - { seq: 3, accepted: true }
  final:
    mode: STANDBY
    faults_set: []
