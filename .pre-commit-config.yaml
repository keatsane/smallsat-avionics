# auto-format + lint on commit
# setup: pip install pre-commit && pre-commit install
# ci runs the same checks

exclude: |
  (?x)^(
    firmware/vendor/
    | firmware/avionics_node_f446/(\.cproject|\.project|\.settings/|.*\.launch|Startup/|.*\.ld)
    | firmware/avionics_node_f446/Src/(syscalls|sysmem)\.c
    | firmware/avionics_node_f446/Inc/FreeRTOSConfig\.h
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md] # keep markdown hard breaks
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        types_or: [c, c++]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff # lint python
        args: [--fix]
      - id: ruff-format # format python
