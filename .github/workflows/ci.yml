name: CI

on:
  push:
  pull_request:

jobs:
  pre-commit:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  # build + test jobs come once flight_sw/ and tools/ exist
