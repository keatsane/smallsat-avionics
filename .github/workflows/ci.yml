name: CI

on:
  push:
  pull_request:

jobs:
  pre-commit:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: pytest -v

  flight-sw:
    name: C++ flight software
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch ETL
        run: git submodule update --init vendor/etl
      - name: Configure
        run: cmake -S fsw -B fsw/build -DCMAKE_BUILD_TYPE=Debug -DFSW_WERROR=ON
      - name: Build
        run: cmake --build fsw/build
      - name: Static analysis (clang-tidy)
        run: |
          sudo apt-get update && sudo apt-get install -y clang-tidy
          clang-tidy -p fsw/build --extra-arg=-Wno-error fsw/src/*.cpp fsw/platform/host/*.cpp
      - name: Test
        run: ctest --test-dir fsw/build --output-on-failure

  # firmware cross-build (arm-none-eabi-gcc) comes next
